display_information:
  name: Claude Code Bot
  description: Send coding tasks to Claude Code from Slack
  background_color: "#D97706"
  long_description: |
    A Slack bot that lets you send coding tasks to Claude Code, get streaming
    results back in threads, approve tool use via interactive buttons, and
    manage multiple concurrent sessions — all from your phone or tablet.

features:
  bot_user:
    display_name: Claude Code
    always_online: true
  slash_commands:
    - command: /cwd
      description: Set working directory for Claude Code session
      usage_hint: /path/to/project
      should_escape: false
    - command: /auto
      description: Switch to auto-approve mode (tools run without asking)
      should_escape: false
    - command: /ask
      description: Switch to ask mode (tool use requires approval)
      should_escape: false
    - command: /claude-status
      description: Show current session info
      should_escape: false
    - command: /stop
      description: Stop the currently running query
      should_escape: false

oauth_config:
  scopes:
    bot:
      - app_mentions:read
      - channels:history
      - channels:read
      - chat:delete
      - chat:write
      - commands
      - files:read
      - groups:history
      - groups:read
      - im:history
      - im:read
      - im:write
      - reactions:read
      - reactions:write
      - users:read

settings:
  event_subscriptions:
    bot_events:
      - app_mention
      - message.channels
      - message.groups
      - message.im
      - reaction_added
  interactivity:
    is_enabled: true
  org_deploy_enabled: false
  socket_mode_enabled: true
  token_rotation_enabled: false
